name: OpenWrt DVB Driver - Extract KO
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-dvb-driver:
    runs-on: ubuntu-22.04
    steps:
      - name: Install base dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison unzip rsync

      - name: Download OpenWrt 22.03.7 x86_64 SDK
        run: |
          wget -O openwrt-sdk.tar.xz https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Checkout DVB & TBS Source
        uses: actions/checkout@v4
        with:
          path: openwrt-sdk/package/openwrt-dvb

      - name: Init Feeds & Safe Config
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          # 只通过 make config 的方式开启选项，不直接写 .config
          cat > .config.tmp <<EOF
CONFIG_KMOD_VIDEO_CORE=y
CONFIG_KMOD_VIDEO_VIDEOBUF2=y
CONFIG_KMOD_VIDEO_V4L2=y
CONFIG_KMOD_DVB_CORE=y
CONFIG_KMOD_MEDIA_SUPPORT=y
EOF
          # 用 merge_config.sh 安全合并配置，避免冲突
          ./scripts/merge_config.sh .config .config.tmp
          make olddefconfig

      - name: Compile v4l-dvb & TBS driver (single-threaded)
        working-directory: openwrt-sdk
        run: |
          make -j1 package/openwrt-dvb/v4l-dvb/compile V=s

      - name: Collect all DVB/TBS related KO files
        working-directory: openwrt-sdk
        run: |
          mkdir -p ko_output
          find build_dir/ -name "*.ko" -path "*/v4l-dvb*" | xargs cp -t ko_output/
          find staging_dir/ -name "*videobuf2*.ko" -o -name "*dvb-core*.ko" | xargs cp -t ko_output/

      - name: Upload KO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbs-dvb-ko-matched
          path: openwrt-sdk/ko_output/
          retention-days: 30
