name: OpenWrt DVB Driver - Extract KO
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-dvb-driver:
    runs-on: ubuntu-22.04
    steps:
      - name: Download OpenWrt 22.03.5 x86_64 SDK
        run: |
          wget -O openwrt-sdk.tar.xz https://downloads.openwrt.org/releases/22.03.5/targets/x86/64/openwrt-sdk-22.03.5-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Checkout DVB Source
        uses: actions/checkout@v4
        with:
          path: openwrt-sdk/package/openwrt-dvb

      - name: Init Feeds & Default Config
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: Compile source
        working-directory: openwrt-sdk
        run: make package/openwrt-dvb/v4l-dvb/compile V=s

      # 收集所有 dvb/tbs 相关 .ko
      - name: Collect KO files
        working-directory: openwrt-sdk
        run: |
          mkdir -p ko_output
          find build_dir/ -name "*.ko" -path "*/v4l-dvb*" | xargs cp -t ko_output/

      - name: Upload KO files
        uses: actions/upload-artifact@v4
        with:
          name: tbs-dvb-ko-files
          path: openwrt-sdk/ko_output/
          retention-days: 30
