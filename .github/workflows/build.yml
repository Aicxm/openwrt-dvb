name: OpenWrt DVB Driver - KO Builder
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison unzip rsync file

      - name: Download OpenWrt 22.03.7 SDK
        run: |
          wget -O openwrt-sdk.tar.xz https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk && ls -la

      - name: Checkout driver source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Init SDK & build v4l-dvb
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          # 直接编译 v4l-dvb 包，SDK 会自动处理所有依赖
          make -j1 package/feeds/packages/v4l-dvb/compile V=sc

      - name: Collect KO files
        working-directory: openwrt-sdk
        run: |
          mkdir -p ../ko_output
          # 从编译结果中提取所有 ko 文件
          find build_dir/ -name "*.ko" -path "*/v4l-dvb*" | xargs cp -t ../ko_output/ || true
          # 复制 SDK 自带的基础模块
          find staging_dir/target-*/root/lib/modules/ -name "*.ko" -exec cp {} ../ko_output/ \; 2>/dev/null || true

      - name: Upload KO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbs-dvb-ko-final
          path: ko_output/
          retention-days: 30
