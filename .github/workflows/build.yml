name: OpenWrt DVB Driver - Direct KO Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build-dvb-driver:
    runs-on: ubuntu-22.04
    steps:
      - name: Install base dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison unzip rsync

      - name: Download OpenWrt 22.03.7 x86_64 SDK
        run: |
          wget -O openwrt-sdk.tar.xz https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Checkout TBS driver source
        uses: actions/checkout@v4
        with:
          path: tbs-driver

      - name: Prepare build environment
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          # 导出正确的环境变量
          export STAGING_DIR=$(pwd)/staging_dir
          export TOOLCHAIN_DIR=$(find $STAGING_DIR -maxdepth 1 -type d -name "toolchain-*x86_64*musl")
          export PATH=$TOOLCHAIN_DIR/bin:$PATH
          export KERNEL_DIR=$(find build_dir/target-*/linux-x86_64 -maxdepth 1 -type d -name "linux-5.10.221")
          echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV
          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV
          echo "CROSS_COMPILE=$(basename $TOOLCHAIN_DIR/bin/*-gcc | sed 's/-gcc$//')-" >> $GITHUB_ENV

      - name: Verify cross compiler
        run: |
          echo "Cross compiler: ${{ env.CROSS_COMPILE }}gcc"
          which ${{ env.CROSS_COMPILE }}gcc || echo "Compiler not found!"

      - name: Build TBS driver directly
        working-directory: tbs-driver
        run: |
          # 检查 Makefile 是否存在
          if [ ! -f Makefile ]; then
            echo "ERROR: Makefile not found in $(pwd)"
            ls -la
            exit 1
          fi
          make -C ${{ env.KERNEL_DIR }} M=$(pwd) modules \
            ARCH=x86_64 \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            V=1

      - name: Collect KO files
        run: |
          mkdir -p ko_output
          find tbs-driver -name "*.ko" -exec cp {} ko_output/ \;
          find openwrt-sdk/staging_dir -name "*videobuf2*.ko" -o -name "*dvb-core*.ko" | xargs cp -t ko_output/ 2>/dev/null || true

      - name: Upload KO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbs-dvb-ko-matched
          path: ko_output/
          retention-days: 30
