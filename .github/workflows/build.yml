name: OpenWrt DVB Driver - Direct KO Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  build-dvb-driver:
    runs-on: ubuntu-22.04
    steps:
      - name: Install base dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev gawk flex bison unzip rsync

      - name: Download OpenWrt 22.03.7 x86_64 SDK
        run: |
          wget -O openwrt-sdk.tar.xz https://downloads.openwrt.org/releases/22.03.7/targets/x86/64/openwrt-sdk-22.03.7-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Checkout TBS driver source
        uses: actions/checkout@v4
        with:
          path: tbs-driver

      - name: Prepare build environment
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          export STAGING_DIR=$(pwd)/staging_dir
          export PATH=$STAGING_DIR/toolchain-x86_64_gcc-11.2.0_musl/bin:$PATH
          export KERNEL_DIR=$(pwd)/build_dir/target-x86_64_musl/linux-x86_64/linux-5.10.221
          echo "KERNEL_DIR=$KERNEL_DIR" >> $GITHUB_ENV

      - name: Build TBS driver directly
        working-directory: tbs-driver
        run: |
          make -C $KERNEL_DIR M=$(pwd) modules ARCH=x86_64 CROSS_COMPILE=x86_64-openwrt-linux-musl-

      - name: Collect KO files
        run: |
          mkdir -p ko_output
          find tbs-driver -name "*.ko" -exec cp {} ko_output/ \;
          # 复制 SDK 自带的基础模块
          find openwrt-sdk/staging_dir -name "*videobuf2*.ko" -o -name "*dvb-core*.ko" | xargs cp -t ko_output/

      - name: Upload KO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbs-dvb-ko-matched
          path: ko_output/
          retention-days: 30
